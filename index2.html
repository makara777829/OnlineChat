<style>
    /* 1. Make sure the header is at the absolute top of the stack */
    header {
        width: 100%;
        height: 60px;
        background: white;
        position: fixed;
        top: 0;
        left: 0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 20px;
        box-sizing: border-box;
        border-bottom: 2px solid #ddd;
        
        /* This ensures the header sits on top of the 3D Canvas */
        z-index: 999999 !important; 
    }

    /* 2. Force the button to be clickable even if the game tries to block it */
    .btn-next {
        background: #ffa502;
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 8px;
        font-weight: 900;
        cursor: pointer;
        
        /* Use 'all' to ensure it captures the pointer */
        pointer-events: all !important; 
        position: relative;
        z-index: 1000000 !important;
    }

    /* 3. Push the game's counter down so it doesn't overlap the header */
    #counter {
        top: 80px !important;
    }
</style>

<header>
    <button onclick="window.history.back()" style="cursor:pointer; z-index:1000000; pointer-events:all;">Back</button>
    
    <span class="gallery-title">Elite Gallery</span>
    
    <button class="btn-next" onclick="console.log('Moving to next page...'); window.location.assign('index3.html');">
        🎮 NEXT GAME
    </button>
</header>
