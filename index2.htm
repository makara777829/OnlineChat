<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crossy Road</title>
    
    
    <style>
        /* --- HEADER & UI OVERLAYS --- */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        header {
            width: 100%;
            height: 60px;
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #ffffff;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 10000; /* High z-index to stay above Three.js canvas */
            box-sizing: border-box;
            border-bottom: 2px solid #ddd;
        }

        .gallery-title {
            font-family: 'Dancing Script', cursive;
            font-size: 1.8rem;
            color: #2f3542;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        .btn-next {
            background: #ffa502;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            font-weight: 900;
            font-size: 10px;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(255, 165, 2, 0.3);
            text-transform: uppercase;
        }

        /* Adjusting existing Crossy Road UI to not hide under header */
        #counter {
            top: 70px !important; /* Move counter below header */
        }

        /* If you have a style.css, ensure it doesn't conflict */
    </style>
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <header>
        <button onclick="window.history.back()" style="background:#2f3542; color:white; border:none; padding:8px 15px; border-radius:8px; font-weight:bold; cursor:pointer;">Back</button>
        
        <span class="gallery-title">Elite Gallery</span>
        
        <button class="btn-next" onclick="window.location.href='index3.html'">🎮 NEXT GAME</button>
    </header>

    <div id="counter">0</div>

    <div id="controlls">
      <div>
        <button id="forward">
          <svg width="30" height="30" viewBox="0 0 10 10">
            <g transform="rotate(0, 5,5)">
              <path d="M5,4 L7,6 L3,6 L5,4" />
            </g>
          </svg>
        </button>
        <button id="left">
          <svg width="30" height="30" viewBox="0 0 10 10">
            <g transform="rotate(-90, 5,5)">
              <path d="M5,4 L7,6 L3,6 L5,4" />
            </g>
          </svg>
        </button>
        <button id="backward">
          <svg width="30" height="30" viewBox="0 0 10 10">
            <g transform="rotate(180, 5,5)">
              <path d="M5,4 L7,6 L3,6 L5,4" />
            </g>
          </svg>
        </button>
        <button id="right">
          <svg width="30" height="30" viewBox="0 0 10 10">
            <g transform="rotate(90, 5,5)">
              <path d="M5,4 L7,6 L3,6 L5,4" />
            </g>
          </svg>
        </button>
      </div>
    </div>

    <div id="end">
      <button id="retry">Retry</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/99/three.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
