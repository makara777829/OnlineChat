<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Elite Gallery | Vertex Titanium</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Inter:wght@400;900&family=JetBrains+Mono&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --ui-bg: rgba(15, 15, 20, 0.98);
            --ui-panel: rgba(25, 25, 35, 0.98);
            --border: rgba(255, 255, 255, 0.1);
            --accent: #00f2ff;
            --accent-glow: rgba(0, 242, 255, 0.3);
            --text-main: #ffffff;
            --text-sub: #888899;
            --danger: #ff4d4d;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: #0a0a0c;
            color: var(--text-main); font-family: 'Inter', sans-serif; height: 100dvh; overflow: hidden; position: fixed; width: 100%; 
        }

        /* --- VERTEX STUDIO INTERFACE --- */
        #paint-studio {
            position: fixed; inset: 0; background: #0a0a0c; z-index: 6000;
            display: none; flex-direction: column; 
        }
        #paint-studio.active { display: flex; }
        canvas#vertexCanvas { position: absolute; top: 0; left: 0; cursor: crosshair; touch-action: none; background: #0a0a0c; }
        .vertex-ui-interface { position: relative; width: 100%; height: 100%; pointer-events: none; z-index: 6001; }
        .ui-panel { pointer-events: auto; background: var(--ui-panel); border: 1px solid var(--border); border-radius: 14px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); backdrop-filter: blur(12px); }
        .ui-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; border-bottom: 1px solid var(--border); }
        .ui-title { font-size: 10px; font-weight: 900; text-transform: uppercase; color: var(--accent); letter-spacing: 3px; }
        .ui-controls-group { display: flex; flex-direction: column; gap: 10px; padding: 15px; max-height: 80vh; overflow-y: auto; }
        .ui-sub { font-size: 9px; text-transform: uppercase; color: var(--text-sub); letter-spacing: 1.5px; font-weight: 700; margin-top: 5px; }
        .btn-tool-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
        .tool-btn { background: var(--ui-bg); border: 1px solid var(--border); color: var(--text-sub); padding: 10px 5px; border-radius: 8px; cursor: pointer; transition: 0.2s; font-size: 10px; display: flex; flex-direction: column; align-items: center; }
        .tool-btn.active { background: var(--accent); color: #000; box-shadow: 0 0 15px var(--accent-glow); border-color: transparent; font-weight: 700; }
        #mainSidebar { position: absolute; left: 20px; top: 20px; width: 240px; }
        #actionGroup { position: absolute; right: 20px; top: 20px; display: flex; gap: 8px; pointer-events: auto; }
        .action-btn { background: var(--ui-panel); border: 1px solid var(--border); color: var(--text-main); padding: 10px 15px; border-radius: 8px; cursor: pointer; font-size: 10px; font-weight: 700; text-transform: uppercase; }
        .action-btn.primary { background: var(--accent); color: #000; border: none; }

        /* --- CHAT STYLES --- */
        .app-container { display: flex; width: 100vw; height: 100dvh; flex-direction: column; background: #0a0a0c; }
        header { padding: 12px 15px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); background: var(--ui-panel); }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        .msg { display: flex; gap: 12px; max-width: 85%; align-items: flex-start; position: relative; }
        .msg.me { align-self: flex-end; flex-direction: row-reverse; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; border: 1px solid var(--border); object-fit: cover; }
        .bubble { background: #1e2229; padding: 12px 15px; border-radius: 15px; position: relative; color: #fff; border: 1px solid var(--border); }
        .msg.me .bubble { background: #2f3542; border-color: var(--accent); }
        
        /* DELETE BUTTON */
        .del-btn { 
            background: var(--danger); color: white; border: none; width: 18px; height: 18px; 
            border-radius: 50%; font-size: 10px; cursor: pointer; position: absolute; 
            top: -5px; right: -5px; display: none; align-items: center; justify-content: center;
        }
        .msg.me:hover .del-btn { display: flex; }

        .footer { padding: 10px 15px; display: flex; align-items: center; gap: 10px; background: #1e2229; padding-bottom: env(safe-area-inset-bottom); }
        .acc-trigger { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--accent); cursor: pointer; }
        .input-wrap { flex: 1; background: #000; border-radius: 20px; display: flex; align-items: center; padding: 0 15px; border: 1px solid var(--border); }
        .input-wrap input { flex: 1; border: none; background: none; padding: 10px; outline: none; font-size: 14px; color: white; }
        .btn-paint-open { background: var(--accent); color: #000; border: none; padding: 10px 15px; border-radius: 10px; font-weight: 900; cursor: pointer; font-size: 0.7rem; }

        /* Sidebar / PRO Member Menu */
        .sidebar { position: fixed; left: 0; top: 0; width: 280px; height: 100%; background: var(--ui-panel); z-index: 7000; transform: translateX(-100%); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); color: white; border-right: 1px solid var(--border); backdrop-filter: blur(20px); }
        .sidebar.active { transform: translateX(0); }
        .member-search { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--border); padding: 10px; border-radius: 8px; color: white; margin-bottom: 15px; outline: none; font-size: 12px; }
        .member-item { display: flex; align-items: center; gap: 10px; padding: 10px; border-radius: 8px; margin-bottom: 5px; transition: 0.2s; }
        .member-item:hover { background: rgba(255,255,255,0.05); }
        .member-count-badge { background: var(--accent); color: black; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 900; margin-left: 10px; }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 8000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-overlay.active { display: flex; }
        .modal-card { background: #1e2229; width: 100%; max-width: 350px; padding: 30px; border-radius: 15px; text-align: center; border: 1px solid var(--border); color: white; }
    </style>
</head>
<body>

<div id="paint-studio">
    <canvas id="vertexCanvas"></canvas>
    <div class="vertex-ui-interface">
        <div id="actionGroup">
            <button class="action-btn" onclick="undo()">Undo</button>
            <button class="action-btn" onclick="clearCanvas()" style="color:var(--danger)">Reset</button>
            <button class="action-btn" onclick="toggleStudio()">Exit</button>
            <button class="action-btn primary" onclick="sendPainting()">Publish Art</button>
        </div>

        <div id="mainSidebar" class="ui-panel">
            <div class="ui-header"><span class="ui-title">VERTEX TITANIUM</span></div>
            <div class="ui-controls-group">
                <div class="ui-sub">Engine Core</div>
                <div class="btn-tool-grid" id="brushGrid">
                    <button class="tool-btn active" data-brush="ink">🖋️ Ink</button>
                    <button class="tool-btn" data-brush="glitch">👾 Glitch</button>
                    <button class="tool-btn" data-brush="drip">💧 Drip</button>
                    <button class="tool-btn" data-brush="neon">⚡ Neon</button>
                    <button class="tool-btn" data-brush="web">🕸️ Web</button>
                    <button class="tool-btn" data-brush="oil">🎨 Oil</button>
                </div>
                <div class="ui-sub">Neural Modes</div>
                <div class="btn-tool-grid">
                    <button class="tool-btn" data-mode="smooth">🎯 Lazy</button>
                    <button class="tool-btn" data-mode="radial">☸️ Radial</button>
                    <button class="tool-btn" data-mode="trail">🌫️ Trail</button>
                    <button class="tool-btn" data-mode="jitter">🎲 Jitter</button>
                    <button class="tool-btn" data-mode="eraser">🧹 Eraser</button>
                </div>
                <div class="ui-sub">Chroma</div>
                <input type="color" id="vertexColorPicker" value="#00f2ff" style="width:100%; height:30px; background:none; border:none;">
                <div class="ui-sub">Caliber <span style="float:right" id="sizeVal">25px</span></div>
                <input type="range" id="sizeSlider" min="1" max="150" value="25" style="width:100%">
            </div>
        </div>
    </div>
</div>

<div class="app-container">
    <header>
        <button onclick="toggleMenu()" style="background:var(--accent); color:black; border:none; padding:8px 12px; border-radius:8px; font-weight:900; font-size:10px;">PRO CATALOG</button>
        <span style="font-family:'Dancing Script'; font-size:1.5rem; font-weight:900; color:var(--accent);">Elite Gallery</span>
        <div style="width:50px"></div>
    </header>

    <div id="chat-box"></div>

    <div class="footer">
        <img id="footer-acc-img" class="acc-trigger" onclick="openProfile()">
        <button class="btn-paint-open" onclick="toggleStudio()">🎨 STUDIO</button>
        <div class="input-wrap">
            <input type="text" id="msg-input" placeholder="Say something..." onkeypress="if(event.key==='Enter') sendMsg()">
            <button onclick="sendMsg()" style="background:none; border:none; font-size:1.2rem; cursor:pointer; color:var(--accent);">➤</button>
        </div>
    </div>
</div>

<aside class="sidebar" id="sidebar">
    <div style="padding:25px;">
        <div style="display:flex; align-items:center; margin-bottom:20px;">
            <h3 style="color:var(--accent); letter-spacing:2px; font-size:14px;">ACTIVE ARTISTS</h3>
            <span class="member-count-badge" id="m-count">0</span>
        </div>
        <input type="text" class="member-search" id="m-search" placeholder="Search members..." oninput="filterMembers()">
        <div id="member-list" style="height:70dvh; overflow-y:auto;"></div>
        <button onclick="toggleMenu()" style="margin-top:20px; color:var(--danger); border:none; background:none; font-weight:900; font-size:11px; cursor:pointer;">CLOSE OVERLAY</button>
    </div>
</aside>

<div id="profile-modal" class="modal-overlay">
    <div class="modal-card">
        <h2 style="font-family:'Dancing Script'; margin-bottom:15px; color:var(--accent);">Your Identity</h2>
        <label for="p-photo-input">
            <img id="setup-preview" src="" style="width:100px; height:100px; border-radius:50%; border:3px solid var(--accent); cursor:pointer; object-fit:cover;">
        </label>
        <input type="file" id="p-photo-input" accept="image/*" style="display:none;" onchange="handleNewPhoto(event)">
        <input type="text" id="p-name-input" placeholder="Enter Name" style="width:100%; padding:12px; margin:15px 0; border:1px solid var(--border); border-radius:10px; text-align:center; background:#000; color:white;">
        <button onclick="saveProfile()" style="width:100%; padding:12px; background:var(--accent); color:black; border:none; border-radius:10px; font-weight:900;">UPDATE PROFILE</button>
    </div>
</div>

<div class="modal-overlay" id="crop-modal" style="background:#000;">
    <div style="width:100%; height:80%;"><img id="crop-target" style="max-width:100%;"></div>
    <button onclick="confirmCrop()" style="padding:15px 30px; background:var(--accent); border:none; border-radius:10px; position:absolute; bottom:30px; font-weight:bold;">CROP IMAGE</button>
</div>

<script>
    const supabaseUrl = 'https://zybglglnszurtdsisvil.supabase.co';
    const supabaseKey = 'sb_publishable_ur42hv6jPnAzsMcPAYVL1A_v2UKB2CA';
    const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

    let me = JSON.parse(localStorage.getItem('elite_v14_user')) || null;
    let cropper = null;
    let currentBlob = null;
    let allMembers = [];

    // --- ORIGINAL ENGINE LOGIC ---
    const canvas = document.getElementById('vertexCanvas');
    const ctx = canvas.getContext('2d');
    let painting = false;
    let history = [];
    let historyStep = -1;
    let points = [];

    const vState = {
        brush: 'ink', color: '#00f2ff', size: 25,
        modes: { smooth: false, radial: false, jitter: false, eraser: false, trail: false },
        lastPoint: {x: 0, y: 0}
    };

    function initStudio() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        saveHistory();
    }

    function getPos(e) {
        const rect = canvas.getBoundingClientRect();
        return { x: (e.clientX || e.touches?.[0].clientX) - rect.left, y: (e.clientY || e.touches?.[0].clientY) - rect.top };
    }

    function startPosition(e) {
        painting = true;
        const pos = getPos(e);
        vState.lastPoint = pos;
        points = [pos];
        draw(e);
    }

    function draw(e) {
        if (!painting) return;
        let currentPos = getPos(e);
        if (vState.modes.smooth) {
            currentPos.x = vState.lastPoint.x + (currentPos.x - vState.lastPoint.x) * 0.15;
            currentPos.y = vState.lastPoint.y + (currentPos.y - vState.lastPoint.y) * 0.15;
        }
        renderStroke(vState.lastPoint, currentPos);
        vState.lastPoint = currentPos;
        points.push(currentPos);
    }

    function renderStroke(p1, p2) {
        if (vState.modes.trail) { ctx.fillStyle = 'rgba(10,10,12,0.05)'; ctx.fillRect(0, 0, canvas.width, canvas.height); }
        if (vState.modes.radial) {
            for (let i = 0; i < 8; i++) {
                ctx.save(); ctx.translate(canvas.width/2, canvas.height/2);
                ctx.rotate((Math.PI * 2 / 8) * i);
                executeBrush({x: p1.x - canvas.width/2, y: p1.y - canvas.height/2}, {x: p2.x - canvas.width/2, y: p2.y - canvas.height/2});
                ctx.restore();
            }
        } else { executeBrush(p1, p2); }
    }

    function executeBrush(p1, p2) {
        ctx.globalCompositeOperation = vState.modes.eraser ? 'destination-out' : 'source-over';
        ctx.strokeStyle = vState.modes.jitter ? `hsl(${Math.random()*360}, 100%, 50%)` : vState.color;
        ctx.lineWidth = vState.size;
        ctx.shadowBlur = (vState.brush === 'neon') ? vState.size : 0;
        ctx.shadowColor = ctx.strokeStyle;
        ctx.beginPath(); ctx.moveTo(p1.x, p1.y);
        switch (vState.brush) {
            case 'glitch':
                ctx.lineTo(p2.x + (Math.random()-0.5)*50, p2.y); ctx.stroke(); break;
            case 'drip':
                ctx.lineTo(p2.x, p2.y); ctx.stroke();
                if (Math.random() > 0.8) {
                    ctx.beginPath(); ctx.lineWidth = vState.size/3;
                    ctx.moveTo(p2.x, p2.y); ctx.lineTo(p2.x, p2.y + Math.random()*100); ctx.stroke();
                } break;
            case 'web':
                ctx.lineWidth = 0.5; ctx.lineTo(p2.x, p2.y); ctx.stroke();
                if(points.length > 10) {
                    const old = points[points.length-10];
                    ctx.moveTo(p2.x, p2.y); ctx.lineTo(old.x, old.y); ctx.stroke();
                } break;
            default: ctx.lineTo(p2.x, p2.y); ctx.stroke();
        }
    }

    function saveHistory() {
        if (historyStep < history.length - 1) history = history.slice(0, historyStep + 1);
        history.push(canvas.toDataURL()); historyStep++;
    }

    function undo() {
        if (historyStep > 0) {
            historyStep--;
            let img = new Image(); img.src = history[historyStep];
            img.onload = () => { ctx.clearRect(0,0,canvas.width,canvas.height); ctx.drawImage(img,0,0); };
        }
    }

    function clearCanvas() { ctx.clearRect(0,0,canvas.width,canvas.height); saveHistory(); }

    async function sendPainting() {
        const blob = await (await fetch(canvas.toDataURL('image/png'))).blob();
        const fileName = `drawings/${me.id}-${Date.now()}.png`;
        await _supabase.storage.from('chat-photos').upload(fileName, blob);
        const { data } = _supabase.storage.from('chat-photos').getPublicUrl(fileName);
        await _supabase.from('messages').insert([{ content: `<img src="${data.publicUrl}" style="width:100%; border-radius:10px;">`, user_id: me.id, user_name: me.username, avatar_url: me.avatar }]);
        toggleStudio();
    }

    // --- MESSAGE DELETE LOGIC ---
    async function deleteMsg(id) {
        if(!confirm("Erase your message?")) return;
        await _supabase.from('messages').delete().eq('id', id).eq('user_id', me.id);
    }

    async function loadMessages() {
        const { data } = await _supabase.from('messages').select('*, profiles(username, avatar_url)').order('created_at', { ascending: true });
        const box = document.getElementById('chat-box');
        box.innerHTML = data.map(m => {
            const isMe = m.user_id === me.id;
            return `<div class="msg ${isMe ? 'me' : ''}">
                <img src="${m.profiles?.avatar_url || m.avatar_url}" class="avatar">
                <div class="bubble">
                    ${isMe ? `<button class="del-btn" onclick="deleteMsg(${m.id})">×</button>` : ''}
                    <div style="font-size:10px; font-weight:900; opacity:0.7; color:var(--accent)">${m.profiles?.username || m.user_name}</div>
                    <div style="margin-top:5px;">${m.content}</div>
                </div>
            </div>`;
        }).join('');
        box.scrollTop = box.scrollHeight;
    }

    async function sendMsg() {
        const input = document.getElementById('msg-input');
        if(!input.value.trim()) return;
        await _supabase.from('messages').insert([{ content: input.value, user_id: me.id, user_name: me.username, avatar_url: me.avatar }]);
        input.value = '';
    }

    // --- PRO MEMBER LOGIC ---
    async function loadMembers() {
        const { data } = await _supabase.from('profiles').select('*').order('username');
        if(data) {
            allMembers = data;
            document.getElementById('m-count').innerText = data.length;
            renderMembers(data);
        }
    }

    function renderMembers(list) {
        const container = document.getElementById('member-list');
        container.innerHTML = list.map(m => `
            <div class="member-item">
                <img src="${m.avatar_url}" style="width:30px; height:30px; border-radius:50%; border:1px solid var(--border);">
                <span style="font-size:13px;">${m.username || 'Anonymous'}</span>
            </div>
        `).join('');
    }

    function filterMembers() {
        const q = document.getElementById('m-search').value.toLowerCase();
        renderMembers(allMembers.filter(m => m.username.toLowerCase().includes(q)));
    }

    // --- SETUP & UI ---
    function init() {
        if (!me) {
            const id = crypto.randomUUID();
            me = { id, username: "New Artist", avatar: `https://api.dicebear.com/7.x/avataaars-neutral/svg?seed=${id}` };
            openProfile();
        } else {
            refreshUI();
            loadMessages();
            loadMembers();
            _supabase.channel('global').on('postgres_changes', { event: '*', schema: 'public', table: 'messages' }, loadMessages).subscribe();
            _supabase.channel('profiles').on('postgres_changes', { event: '*', schema: 'public', table: 'profiles' }, loadMembers).subscribe();
        }
    }

    function refreshUI() {
        document.getElementById('footer-acc-img').src = me.avatar;
        document.getElementById('setup-preview').src = me.avatar;
        document.getElementById('p-name-input').value = me.username;
    }

    async function saveProfile() {
        const name = document.getElementById('p-name-input').value.trim();
        if(!name) return;
        if(currentBlob) {
            const fileName = `avatars/${me.id}.jpg`;
            await _supabase.storage.from('chat-photos').upload(fileName, currentBlob, { upsert: true });
            const { data } = _supabase.storage.from('chat-photos').getPublicUrl(fileName);
            me.avatar = data.publicUrl;
        }
        me.username = name;
        localStorage.setItem('elite_v14_user', JSON.stringify(me));
        await _supabase.from('profiles').upsert({ id: me.id, username: me.username, avatar_url: me.avatar });
        closeProfile(); refreshUI(); loadMessages(); loadMembers();
    }

    function handleNewPhoto(e) {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = (f) => {
            document.getElementById('crop-modal').classList.add('active');
            const target = document.getElementById('crop-target');
            target.src = f.target.result;
            if (cropper) cropper.destroy();
            cropper = new Cropper(target, { aspectRatio: 1 });
        };
        reader.readAsDataURL(file);
    }

    function confirmCrop() {
        cropper.getCroppedCanvas().toBlob(blob => {
            currentBlob = blob;
            document.getElementById('setup-preview').src = URL.createObjectURL(blob);
            document.getElementById('crop-modal').classList.remove('active');
        });
    }

    function toggleStudio() { document.getElementById('paint-studio').classList.toggle('active'); if(document.getElementById('paint-studio').classList.contains('active')) initStudio(); }
    function toggleMenu() { document.getElementById('sidebar').classList.toggle('active'); if(document.getElementById('sidebar').classList.contains('active')) loadMembers(); }
    function openProfile() { document.getElementById('profile-modal').classList.add('active'); }
    function closeProfile() { document.getElementById('profile-modal').classList.remove('active'); }

    // --- LISTENERS ---
    canvas.addEventListener('mousedown', startPosition);
    canvas.addEventListener('mousemove', draw);
    window.addEventListener('mouseup', () => { if(painting) saveHistory(); painting = false; });
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); startPosition(e.touches[0]); });
    canvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e.touches[0]); });
    window.addEventListener('touchend', () => { if(painting) saveHistory(); painting = false; });

    document.getElementById('vertexColorPicker').oninput = (e) => vState.color = e.target.value;
    document.getElementById('sizeSlider').oninput = (e) => { vState.size = e.target.value; document.getElementById('sizeVal').innerText = vState.size + 'px'; };
    
    document.querySelectorAll('#brushGrid .tool-btn').forEach(btn => {
        btn.onclick = (e) => {
            document.querySelector('#brushGrid .tool-btn.active').classList.remove('active');
            vState.brush = e.currentTarget.dataset.brush;
            e.currentTarget.classList.add('active');
        };
    });

    document.querySelectorAll('[data-mode]').forEach(btn => {
        btn.onclick = (e) => {
            vState.modes[e.currentTarget.dataset.mode] = !vState.modes[e.currentTarget.dataset.mode];
            e.currentTarget.classList.toggle('active');
        };
    });

    init();
</script>
</body>
</html>
