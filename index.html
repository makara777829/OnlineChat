<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Elite Messenger | Full Screen</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #050505;
            --surface: #121212;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --accent: #00d2ff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body {
            background: var(--bg); 
            color: white; 
            font-family: 'Inter', sans-serif;
            height: 100dvh; 
            width: 100vw;
            overflow: hidden;
            position: fixed; /* Prevents bouncing on iOS */
        }

        .app-container {
            display: flex; 
            width: 100%; 
            height: 100%; 
            background: var(--bg);
            position: relative;
        }

        /* --- SIDEBAR (Slide-in Menu) --- */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            height: 100%;
            width: 280px;
            background: #0a0a0a;
            border-right: 1px solid var(--border);
            transform: translateX(-100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 2000;
            display: flex;
            flex-direction: column;
        }
        .sidebar.active { transform: translateX(0); }

        .sidebar-header { 
            padding: 20px; 
            font-weight: 900; 
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #member-list { flex: 1; overflow-y: auto; padding: 15px; }
        .member-item { 
            display: flex; align-items: center; gap: 12px; padding: 10px; 
            border-radius: 12px; margin-bottom: 8px; background: var(--glass);
        }

        /* --- MAIN CHAT AREA --- */
        .chat-main { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            width: 100%;
            height: 100%;
        }
        
        .top-nav {
            padding: 12px 15px;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 15px;
            padding-top: env(safe-area-inset-top, 12px); /* Fix for notch phones */
        }

        .menu-btn {
            background: var(--accent); color: black; border: none; 
            padding: 6px 12px; border-radius: 15px; font-weight: 800; font-size: 0.8rem;
        }

        #messages { 
            flex: 1; 
            overflow-y: auto; 
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            gap: 15px;
            background: linear-gradient(to bottom, #050505, #0a0a0a);
        }

        .avatar { width: 38px; height: 38px; border-radius: 50%; border: 2px solid var(--accent); object-fit: cover; }
        .message-row { display: flex; gap: 10px; align-items: flex-end; max-width: 85%; }
        
        .msg-bubble { 
            background: #1e1e1e; 
            padding: 12px 16px; 
            border-radius: 18px; 
            border-bottom-left-radius: 4px;
            border: 1px solid var(--border);
            position: relative;
        }
        .msg-user { color: var(--accent); font-weight: 800; font-size: 0.65rem; margin-bottom: 4px; text-transform: uppercase; }

        /* REACTION CHIPS */
        .reactions-row { display: flex; gap: 4px; margin-top: 6px; }
        .react-btn { 
            background: rgba(255,255,255,0.05); border: 1px solid var(--border);
            padding: 3px 8px; border-radius: 12px; font-size: 0.75rem; cursor: pointer;
        }
        .react-btn.active { background: var(--accent); color: black; }

        /* --- FOOTER (Input Bar) --- */
        .footer { 
            padding: 10px 15px; 
            background: #000; 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            border-top: 1px solid var(--border);
            padding-bottom: env(safe-area-inset-bottom, 15px); /* Fix for bottom swipe bar */
        }
        
        #msgInput { 
            flex: 1; background: #1a1a1a; border: 1px solid var(--border); 
            padding: 12px 18px; border-radius: 25px; color: white; outline: none; font-size: 16px; 
        }

        .btn-send { 
            background: var(--accent); color: black; border: none; 
            width: 40px; height: 40px; border-radius: 50%; font-weight: 900; 
            display: flex; align-items: center; justify-content: center;
        }

        /* Desktop Mode (Keep it centered) */
        @media (min-width: 1024px) {
            .app-container { width: 450px; margin: auto; height: 90vh; border-radius: 20px; border: 1px solid var(--border); }
            body { display: flex; align-items: center; justify-content: center; position: relative; }
            .sidebar { position: absolute; left: -300px; transform: none; display: block; border-radius: 20px; height: 90vh; }
        }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 3000; }
        .modal-overlay.active { display: flex; }
    </style>
</head>
<body>

<div class="app-container">
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span>MEMBERS</span>
            <button onclick="toggleSidebar()" style="background:none; border:none; color:white; font-size:1.5rem;">✕</button>
        </div>
        <div id="member-list"></div>
    </aside>

    <main class="chat-main">
        <nav class="top-nav">
            <button class="menu-btn" onclick="toggleSidebar()">☰ Members</button>
            <span style="font-weight: 800; font-size: 0.9rem; color: var(--accent);">ELITE CHAT</span>
        </nav>

        <div id="messages"></div>

        <div class="footer">
            <img id="my-avatar" class="avatar" style="width:35px; height:35px; cursor:pointer;" onclick="openProfile()">
            <input type="text" id="msgInput" placeholder="Aa" onkeypress="if(event.key==='Enter') sendMessage()">
            <button class="btn-send" onclick="sendMessage()">➤</button>
        </div>
    </main>
</div>

<div class="modal-overlay" id="profileModal">
    <div class="modal-card" style="background:#111; padding:30px; border-radius:20px; text-align:center; border:1px solid var(--border);">
        <h3>Change Name</h3>
        <input type="text" id="newName" style="width:100%; padding:12px; margin:20px 0; background:#000; color:white; border:1px solid var(--border); border-radius:10px; text-align:center;">
        <button class="menu-btn" style="width:100%; padding:10px;" onclick="saveProfile()">SAVE</button>
        <p onclick="closeProfile()" style="margin-top:15px; color:#555; cursor:pointer;">CLOSE</p>
    </div>
</div>

<script>
    const supabaseUrl = 'https://zybglglnszurtdsisvil.supabase.co';
    const supabaseKey = 'sb_publishable_ur42hv6jPnAzsMcPAYVL1A_v2UKB2CA';
    const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

    let user = JSON.parse(localStorage.getItem('elite_user_v11')) || null;

    async function init() {
        if (!user) {
            const id = crypto.randomUUID();
            user = { id, username: "Player_" + id.slice(0,4), avatar: `https://api.dicebear.com/7.x/bottts/svg?seed=${id}` };
            localStorage.setItem('elite_user_v11', JSON.stringify(user));
        }
        document.getElementById('my-avatar').src = user.avatar;
        document.getElementById('newName').value = user.username;

        loadMessages();
        loadMembers();

        _supabase.channel('room1').on('postgres_changes', { event: '*', schema: 'public', table: 'messages' }, loadMessages).subscribe();
        _supabase.channel('room1').on('postgres_changes', { event: '*', schema: 'public', table: 'profiles' }, loadMembers).subscribe();
        _supabase.channel('room1').on('postgres_changes', { event: '*', schema: 'public', table: 'reactions' }, loadMessages).subscribe();
    }

    async function loadMessages() {
        const { data } = await _supabase.from('messages').select('*, profiles(username, avatar_url), reactions(emoji, user_id)').order('created_at', { ascending: true });
        if(data) {
            const box = document.getElementById('messages');
            box.innerHTML = '';
            data.forEach(msg => {
                const isMe = msg.user_id === user.id;
                const name = msg.profiles?.username || msg.user_name || "Guest";
                const pic = msg.profiles?.avatar_url || msg.avatar_url;

                const div = document.createElement('div');
                div.className = 'message-row';
                if(isMe) div.style.alignSelf = 'flex-end';
                
                div.innerHTML = `
                    ${!isMe ? `<img src="${pic}" class="avatar">` : ''}
                    <div class="msg-bubble" style="${isMe ? 'background: #0084ff; border:none; border-bottom-left-radius: 18px; border-bottom-right-radius: 4px;' : ''}">
                        <div class="msg-user" style="${isMe ? 'color: white; opacity:0.8;' : ''}">${name}</div>
                        <div>${msg.content}</div>
                        <div class="reactions-row">
                            ${['❤️', '🔥', '👍'].map(e => {
                                const count = msg.reactions?.filter(r => r.emoji === e).length || 0;
                                const mine = msg.reactions?.some(r => r.emoji === e && r.user_id === user.id);
                                return `<span class="react-btn ${mine?'active':''}" onclick="react(${msg.id},'${e}')">${e} ${count||''}</span>`;
                            }).join('')}
                        </div>
                    </div>`;
                box.appendChild(div);
            });
            box.scrollTop = box.scrollHeight;
        }
    }

    async function sendMessage() {
        const input = document.getElementById('msgInput');
        if(!input.value.trim()) return;
        await _supabase.from('messages').insert([{ content: input.value, user_id: user.id, user_name: user.username, avatar_url: user.avatar }]);
        input.value = '';
    }

    async function react(mId, emoji) {
        const { data } = await _supabase.from('reactions').select().eq('message_id', mId).eq('user_id', user.id).eq('emoji', emoji);
        if(data.length) await _supabase.from('reactions').delete().eq('id', data[0].id);
        else await _supabase.from('reactions').insert([{ message_id: mId, user_id: user.id, emoji }]);
    }

    async function loadMembers() {
        const { data } = await _supabase.from('profiles').select('*');
        if(data) {
            document.getElementById('member-list').innerHTML = data.map(m => `
                <div class="member-item">
                    <img src="${m.avatar_url}" class="avatar" style="width:30px; height:30px;">
                    <span>${m.username}</span>
                </div>`).join('');
        }
    }

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }
    function openProfile() { document.getElementById('profileModal').classList.add('active'); }
    function closeProfile() { document.getElementById('profileModal').classList.remove('active'); }
    async function saveProfile() {
        user.username = document.getElementById('newName').value;
        localStorage.setItem('elite_user_v11', JSON.stringify(user));
        await _supabase.from('profiles').upsert({ id: user.id, username: user.username, avatar_url: user.avatar });
        closeProfile();
    }

    init();
</script>
</body>
</html>
